name: SSH
description: SSH (Secure Shell) is a cryptographic network protocol for secure remote
  login, command execution, and file transfer between computers over unsecured networks.
  It provides strong encryption, authentication, and data integrity, replacing insecure
  protocols like Telnet and serving as a fundamental tool for system administration
  and DevOps.
