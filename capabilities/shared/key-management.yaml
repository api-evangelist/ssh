naftiko: "1.0.0-alpha1"

info:
  label: "SSH Key Management API"
  description: "REST API for SSH key management, certificate signing, and authorized keys administration."
  tags:
    - SSH
    - Key Management
    - Certificate Authority
    - Authentication
    - Security
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SSH_MGMT_API_TOKEN: SSH_MGMT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: ssh-key-management
      baseUri: https://api.openssh.example.com/v1
      description: "SSH Key Management REST API"
      authentication:
        type: bearer
        token: "{{SSH_MGMT_API_TOKEN}}"
      resources:
        - name: keys
          path: /keys
          description: "SSH key registration and management"
          operations:
            - name: list-keys
              method: GET
              description: "List registered SSH keys"
              inputParameters:
                - name: userId
                  in: query
                  type: string
                  required: false
                - name: keyType
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-key
              method: POST
              description: "Register a new SSH public key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  publicKey: "{{tools.publicKey}}"
                  comment: "{{tools.comment}}"
        - name: generate-key-pair
          path: /keys/generate
          description: "SSH key pair generation"
          operations:
            - name: generate-key-pair
              method: POST
              description: "Generate a new SSH key pair"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: key-by-id
          path: /keys/{keyId}
          description: "Individual key management"
          operations:
            - name: get-key
              method: GET
              description: "Get SSH key details"
              inputParameters:
                - name: keyId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-key
              method: DELETE
              description: "Delete an SSH key"
              inputParameters:
                - name: keyId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: certificates
          path: /certificates
          description: "SSH certificate authority operations"
          operations:
            - name: sign-certificate
              method: POST
              description: "Sign an SSH public key to create a certificate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-certificates
              method: GET
              description: "List issued SSH certificates"
              inputParameters:
                - name: principal
                  in: query
                  type: string
                  required: false
                - name: expired
                  in: query
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: authorized-keys
          path: /authorized-keys/{username}
          description: "Authorized keys management"
          operations:
            - name: get-authorized-keys
              method: GET
              description: "Get authorized keys for a user"
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-authorized-key
              method: POST
              description: "Add a key to user authorized_keys"
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: known-hosts
          path: /known-hosts
          description: "Known hosts management"
          operations:
            - name: list-known-hosts
              method: GET
              description: "List known SSH hosts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-known-host
              method: POST
              description: "Add a host to known_hosts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ssh-key-management-api
      resources:
        - path: /v1/keys
          name: keys
          description: "SSH key management"
          operations:
            - method: GET
              name: list-keys
              description: "List SSH keys"
            - method: POST
              name: add-key
              description: "Register SSH key"
        - path: /v1/certificates
          name: certificates
          description: "SSH certificates"
          operations:
            - method: GET
              name: list-certificates
              description: "List certificates"
            - method: POST
              name: sign-certificate
              description: "Sign certificate"

    - type: mcp
      port: 9100
      namespace: ssh-key-management-mcp
      transport: http
      tools:
        - name: list-keys
          description: "List registered SSH public keys"
          hints:
            readOnly: true
            idempotent: true
          call: "ssh-key-management.list-keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-key
          description: "Register a new SSH public key"
          hints:
            readOnly: false
            idempotent: false
          call: "ssh-key-management.add-key"
          outputParameters:
            - type: object
              mapping: "$."
        - name: generate-key-pair
          description: "Generate a new SSH key pair"
          hints:
            readOnly: false
            idempotent: false
          call: "ssh-key-management.generate-key-pair"
          outputParameters:
            - type: object
              mapping: "$."
        - name: sign-certificate
          description: "Sign an SSH public key to create a certificate"
          hints:
            readOnly: false
            idempotent: false
          call: "ssh-key-management.sign-certificate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-certificates
          description: "List issued SSH certificates with validity periods"
          hints:
            readOnly: true
            idempotent: true
          call: "ssh-key-management.list-certificates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-authorized-keys
          description: "Get authorized SSH keys for a user"
          hints:
            readOnly: true
            idempotent: true
          call: "ssh-key-management.get-authorized-keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-known-hosts
          description: "List known SSH hosts and their keys"
          hints:
            readOnly: true
            idempotent: true
          call: "ssh-key-management.list-known-hosts"
          outputParameters:
            - type: object
              mapping: "$."
